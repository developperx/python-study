name: CI

on:
  push:
    branches:
      - main
      - claude/pensive-dijkstra-rwqokt
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 問題データを再生成し、コード出力問題とデータ整合性を検証
      - name: Build & validate question bank
        run: |
          python3 tools/build_questions.py
          python3 tools/validate_data.py
